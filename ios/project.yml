name: Distill
options:
  bundleIdPrefix: com.gtinside
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.0.0

targets:
  Distill:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Distill/Sources
      - path: Distill/Resources
        optional: true
    dependencies:
      - package: Supabase
        product: Supabase
    entitlements:
      path: Distill/Resources/Distill.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gtinside.distill
        SWIFT_VERSION: "5.10"
        DEVELOPMENT_TEAM: ""
        INFOPLIST_FILE: Distill/Resources/Info.plist
    info:
      path: Distill/Resources/Info.plist
      properties:
        CFBundleDisplayName: Distill
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
